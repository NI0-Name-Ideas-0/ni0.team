<div class="flex flex-col gap-10">
  @for (section of sections(); track section.title) {
    <section [attr.aria-labelledby]="'ls-' + storageNamespace() + '-' + $index">
      <h2
        [id]="'ls-' + storageNamespace() + '-' + $index"
        class="text-lg font-semibold text-gray-900 dark:text-white mb-3"
      >
        {{ section.title }}
      </h2>
      <ul class="flex flex-col gap-2" role="list">
        @for (link of section.links; track link.url) {
          <li>
            <a
              [href]="link.url"
              target="_blank"
              rel="noopener noreferrer"
              (click)="markVisited(link)"
              class="flex items-center gap-3 p-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-blue-300 dark:hover:border-blue-700 hover:-translate-y-0.5 hover:shadow-md transition-all duration-200"
            >
              <img
                [src]="faviconSrc(link)"
                [alt]="link.label + ' favicon'"
                width="16"
                height="16"
                class="shrink-0 dark:hidden"
              />
              <img
                [src]="faviconDarkSrc(link)"
                alt=""
                aria-hidden="true"
                width="16"
                height="16"
                class="shrink-0 hidden dark:block"
              />
              <span class="font-medium text-gray-900 dark:text-white text-sm shrink-0">{{ link.label }}</span>
              <span class="text-gray-400 dark:text-gray-500 text-xs truncate min-w-0 flex-1">{{ link.url }}</span>
              @if (isNew(link)) {
                <span
                  class="shrink-0 text-xs font-semibold px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300"
                  aria-label="New"
                >New</span>
              }
            </a>
          </li>
        }
      </ul>
    </section>
  }
</div>
